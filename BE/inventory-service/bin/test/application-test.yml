spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  application:
    name: inventory-service-test

# Disable Eureka in tests
eureka:
  client:
    enabled: false

application:
  security:
    jwt:
      secret-key: dummy-secret-key-at-least-32-characters-long-123456

