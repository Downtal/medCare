server:
  port: 8082

spring:
  cloud:
    compatibility-verifier:
      enabled: false
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/medcare_auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# JWT configuration
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 600000                # 10 minutes in ms
      refresh-token:
        expiration: 604800000    # 7 days in ms
