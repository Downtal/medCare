spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/medcare_payment_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8089

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}

# VNPay Configuration
vnpay:
  tmn-code: ${VNP_TMN_CODE:ZWS62IWD}
  hash-secret: ${VNP_HASH_SECRET:9BO0AWMN9QE5C04FHUKZHYEO1LOTAGXA}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${VNP_RETURN_URL:http://localhost:3000/payment/callback}
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
