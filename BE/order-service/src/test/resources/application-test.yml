spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    config:
      enabled: false
  sql:
    init:
      mode: always

application:
  security:
    jwt:
      secret-key: testSecretKeyForJWTTokenTestingPurposes1234567890

eureka:
  client:
    enabled: false
  instance:
    enabled: false
